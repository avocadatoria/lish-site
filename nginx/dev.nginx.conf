# ─────────────────────────────────────────────────────────────
# Dev reverse proxy
#
# Copy this to /usr/local/etc/nginx/nginx.conf, then:
#   nginx -t && nginx -s reload
#
# Routes:
#   localhost:3000/api/*  →  Fastify  (127.0.0.1:3002)
#   localhost:3000/*      →  Next.js  (127.0.0.1:3001)
#   localhost:3004/*      →  Strapi   (127.0.0.1:1337)
#
# Cleanup: remove old /usr/local/var/log/nginx/error.log
#          and /usr/local/var/log/nginx/access.log
# ─────────────────────────────────────────────────────────────

worker_processes  1;

error_log  /usr/local/var/log/nginx/scaffold-dev.log  info;
pid        /usr/local/var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';

    access_log  /usr/local/var/log/nginx/scaffold-dev.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # No gzip in dev — keeps things simple, avoids Content-Length mismatches
    gzip  off;

    # Temp paths Nginx can actually write to (avoids Permission denied on proxy_temp)
    client_body_temp_path  /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy_temp;
    fastcgi_temp_path      /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path        /tmp/nginx_uwsgi_temp;
    scgi_temp_path         /tmp/nginx_scgi_temp;

    upstream nextjs {
        server 127.0.0.1:3001;
    }

    upstream fastify {
        server 127.0.0.1:3002;
    }

    upstream strapi {
        server 127.0.0.1:1337;
    }

    server {
        listen       3000;
        server_name  localhost;

        # ── Basic Auth (site-wide, disabled per-location where needed) ──
        auth_basic           "Restricted";
        auth_basic_user_file /Users/steve/projects/scaffold-master/nginx/.htpasswd;

        # ── API routes → Fastify ──────────────────────────────

        location /api/ {
            proxy_pass         http://fastify;
            proxy_http_version 1.1;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # SSE: no buffering, no cache
            proxy_buffering    off;
            proxy_cache        off;

            # Longer timeout for streaming / long-poll endpoints
            proxy_read_timeout 300s;
        }

        # ── Next.js HMR WebSocket ─────────────────────────────

        location /_next/webpack-hmr {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;

            proxy_set_header   Host       $host;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Everything else → Next.js ─────────────────────────

        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Buffer settings for large JS chunks
            proxy_buffer_size        16k;
            proxy_buffers            8 32k;
            proxy_busy_buffers_size  64k;
        }
    }

    # ─────────────────────────────────────────────────────────
    # Backend services — one server block per service, each on
    # its own port.  FRP tunnels each port to a dedicated
    # public HTTPS endpoint.
    #
    #   Strapi  :3004  →  https://frp-2.avocadatoria.com
    #   (WP     :3005  →  https://frp-1.avocadatoria.com:3444  — future)
    # ─────────────────────────────────────────────────────────

    # ── Strapi CMS ───────────────────────────────────────────

    server {
        listen       3004;
        server_name  localhost;

        # Dev: no caching — prevents stale-chunk errors after admin rebuilds
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        location / {
            proxy_pass         http://strapi;
            proxy_http_version 1.1;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            client_max_body_size 50m;
        }
    }
}
