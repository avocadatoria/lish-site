# ─────────────────────────────────────────────────────────────
# Production reverse proxy — EC2 behind ALB / CloudFront
#
# Copy to /etc/nginx/nginx.conf, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# No SSL — terminates at the load balancer.
#
# Routes:
#   :3000/api/*  →  Fastify  (127.0.0.1:3002)
#   :3000/*      →  Next.js  (127.0.0.1:3001)
#   :3004/*      →  Strapi   (127.0.0.1:1337)
# ─────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/lish.log  warn;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';

    access_log  /var/log/nginx/lish.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip — ALB/CF pass through, so compress at origin
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  6;
    gzip_min_length  256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Request body limit (adjust for file uploads)
    client_max_body_size  50m;

    # Temp paths
    client_body_temp_path  /var/lib/nginx/tmp/client_body;
    proxy_temp_path        /var/lib/nginx/tmp/proxy;

    upstream nextjs {
        server 127.0.0.1:3001;
    }

    upstream fastify {
        server 127.0.0.1:3002;
    }

    upstream strapi {
        server 127.0.0.1:1337;
    }

    server {
        listen       3000;
        server_name  _;

        # ── Basic Auth (site-wide, disabled per-location where needed) ──
        auth_basic           "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"                    always;
        add_header X-Content-Type-Options  "nosniff"                      always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # Health check for ALB target group
        location = /health {
            access_log off;
            return 200 "ok";
        }

        # ── API routes → Fastify ──────────────────────────────

        location /api/ {
            proxy_pass         http://fastify;
            proxy_http_version 1.1;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # SSE: no buffering, no cache
            proxy_buffering    off;
            proxy_cache        off;

            # Longer timeout for streaming / long-poll endpoints
            proxy_read_timeout 300s;
        }

        # ── Everything else → Next.js ─────────────────────────

        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            # Buffer settings for large JS chunks
            proxy_buffer_size        16k;
            proxy_buffers            8 32k;
            proxy_busy_buffers_size  64k;
        }
    }

    # ─────────────────────────────────────────────────────────
    # Backend services — one server block per service, each on
    # its own port.  FRP tunnels / ALB listeners route to the
    # dedicated public endpoint.
    #
    #   Strapi  :3004  →  https://frp-2.avocadatoria.com (dev) / dedicated ALB listener (prod)
    # ─────────────────────────────────────────────────────────

    # ── Strapi CMS ───────────────────────────────────────────

    server {
        listen       3004;
        server_name  _;

        # No caching — Strapi admin + API must never be cached
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        location / {
            proxy_pass         http://strapi;
            proxy_http_version 1.1;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";

            client_max_body_size 50m;
        }
    }
}
